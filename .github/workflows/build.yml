name: Fix y compilar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Aplicar correcciones
        env:
          BUILD_GRADLE: ""
          PDF_ACTIVITY: ""
          PDF_LAYOUT: ""
          ICONS_PY: ""
        run: |
          echo "$BUILD_GRADLE"  | base64 -d > app/build.gradle
          echo "$PDF_ACTIVITY"  | base64 -d > app/src/main/java/com/lectorpdf/app/PdfViewerActivity.kt
          echo "$PDF_LAYOUT"    | base64 -d > app/src/main/res/layout/activity_pdf_viewer.xml
          echo "$ICONS_PY"      | base64 -d > gen_icons.py
          echo "Archivos corregidos"
          grep "implementation" app/build.gradle

      - name: Generar iconos
        run: |
          pip install Pillow -q
          python3 gen_icons.py

      - name: Compilar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-v1.3
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
