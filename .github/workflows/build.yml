name: Crear proyecto y compilar APK

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear archivos del proyecto
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/lectorpdf/app/HistoryItem.kt')"
          echo 'cGFja2FnZSBjb20ubGVjdG9ycGRmLmFwcAoKZGF0YSBjbGFzcyBIaXN0b3J5SXRlbSgKICAgIHZhbCB1cmlTdHJpbmc6IFN0cmluZywKICAgIHZhbCBmaWxlTmFtZTogU3RyaW5nLAogICAgdmFsIGRhdGU6IFN0cmluZwopCg==' | base64 -d > 'app/src/main/java/com/lectorpdf/app/HistoryItem.kt'
          mkdir -p "$(dirname 'app/src/main/java/com/lectorpdf/app/HistoryAdapter.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/lectorpdf/app/HistoryAdapter.kt'
          mkdir -p "$(dirname 'app/src/main/java/com/lectorpdf/app/MainActivity.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/lectorpdf/app/MainActivity.kt'
          mkdir -p "$(dirname 'app/src/main/java/com/lectorpdf/app/PdfViewerActivity.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/lectorpdf/app/PdfViewerActivity.kt'
          mkdir -p "$(dirname 'app/src/main/java/com/lectorpdf/app/ZoomLayout.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/lectorpdf/app/ZoomLayout.kt'
          mkdir -p "$(dirname 'app/src/main/AndroidManifest.xml')"
          echo '' | base64 -d > 'app/src/main/AndroidManifest.xml'
          mkdir -p "$(dirname 'app/src/main/res/layout/activity_main.xml')"
          echo '' | base64 -d > 'app/src/main/res/layout/activity_main.xml'
          mkdir -p "$(dirname 'app/src/main/res/layout/activity_pdf_viewer.xml')"
          echo '' | base64 -d > 'app/src/main/res/layout/activity_pdf_viewer.xml'
          mkdir -p "$(dirname 'app/src/main/res/layout/item_history.xml')"
          echo '' | base64 -d > 'app/src/main/res/layout/item_history.xml'
          mkdir -p "$(dirname 'app/src/main/res/layout/item_pdf_page.xml')"
          echo '' | base64 -d > 'app/src/main/res/layout/item_pdf_page.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/colors.xml')"
          echo '' | base64 -d > 'app/src/main/res/values/colors.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/strings.xml')"
          echo '' | base64 -d > 'app/src/main/res/values/strings.xml'
          mkdir -p "$(dirname 'app/src/main/res/values/themes.xml')"
          echo '' | base64 -d > 'app/src/main/res/values/themes.xml'
          mkdir -p "$(dirname 'app/src/main/res/xml/file_paths.xml')"
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHBhdGhzPgogICAgPGV4dGVybmFsLXBhdGggbmFtZT0iZXh0ZXJuYWxfZmlsZXMiIHBhdGg9Ii4iIC8+CiAgICA8ZmlsZXMtcGF0aCBuYW1lPSJpbnRlcm5hbF9maWxlcyIgcGF0aD0iLiIgLz4KICAgIDxjYWNoZS1wYXRoIG5hbWU9ImNhY2hlX2ZpbGVzIiBwYXRoPSIuIiAvPgo8L3BhdGhzPgo=' | base64 -d > 'app/src/main/res/xml/file_paths.xml'
          mkdir -p "$(dirname 'app/src/main/res/drawable/ic_open.xml')"
          echo '' | base64 -d > 'app/src/main/res/drawable/ic_open.xml'
          mkdir -p "$(dirname 'app/src/main/res/drawable/ic_pdf_file.xml')"
          echo '' | base64 -d > 'app/src/main/res/drawable/ic_pdf_file.xml'
          mkdir -p "$(dirname 'app/src/main/res/drawable/ic_delete.xml')"
          echo '' | base64 -d > 'app/src/main/res/drawable/ic_delete.xml'
          mkdir -p "$(dirname 'app/build.gradle')"
          echo '' | base64 -d > 'app/build.gradle'
          mkdir -p "$(dirname 'build.gradle')"
          echo 'cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguMi4yJyBhcHBseSBmYWxzZQogICAgaWQgJ29yZy5qZXRicmFpbnMua290bGluLmFuZHJvaWQnIHZlcnNpb24gJzEuOS4yMicgYXBwbHkgZmFsc2UKfQo=' | base64 -d > 'build.gradle'
          mkdir -p "$(dirname 'settings.gradle')"
          echo '' | base64 -d > 'settings.gradle'
          mkdir -p "$(dirname 'gradle.properties')"
          echo 'b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmtvdGxpbi5jb2RlLnN0eWxlPW9mZmljaWFsCmFuZHJvaWQubm9uVHJhbnNpdGl2ZVJDbGFzcz10cnVlCg==' | base64 -d > 'gradle.properties'
          mkdir -p "$(dirname 'app/proguard-rules.pro')"
          echo 'LWtlZXAgY2xhc3MgYW5kcm9pZC5ncmFwaGljcy5wZGYuKiogeyAqOyB9Ci1rZWVwYXR0cmlidXRlcyAqQW5ub3RhdGlvbioKLWtlZXBhdHRyaWJ1dGVzIFNvdXJjZUZpbGUsTGluZU51bWJlclRhYmxlCg==' | base64 -d > 'app/proguard-rules.pro'
          mkdir -p "$(dirname 'gen_icons.py')"
          echo '' | base64 -d > 'gen_icons.py'
          echo "Archivos creados correctamente"

      - name: Generar iconos
        run: |
          pip install Pillow -q
          python3 gen_icons.py

      - name: Descargar Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          rm -rf gradle-8.4 gradle-8.4-bin.zip

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap: Lector PDF generado automaticamente"
          git push

      - name: Compilar APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
