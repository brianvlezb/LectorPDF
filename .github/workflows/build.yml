name: LectorPDF v1.7 completo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Aplicar archivos
        env:
          BUILD_GRADLE: ""
          MAIN_ACTIVITY: ""
          PDF_ACTIVITY: ""
          PDF_LAYOUT: ""
        run: |
          echo "$BUILD_GRADLE"  | base64 -d > app/build.gradle
          echo "$MAIN_ACTIVITY" | base64 -d > app/src/main/java/com/lectorpdf/app/MainActivity.kt
          echo "$PDF_ACTIVITY"  | base64 -d > app/src/main/java/com/lectorpdf/app/PdfViewerActivity.kt
          echo "$PDF_LAYOUT"    | base64 -d > app/src/main/res/layout/activity_pdf_viewer.xml
          grep "chrisbanes" app/build.gradle && echo "Build.gradle OK"

      - name: Compilar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-v1.7
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
