name: Sin duplicados v1.7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Aplicar correcciones
        env:
          MAIN_ACTIVITY: ""
        run: |
          echo "$MAIN_ACTIVITY" | base64 -d > app/src/main/java/com/lectorpdf/app/MainActivity.kt

      - name: Compilar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-v1.7
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
