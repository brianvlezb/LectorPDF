name: Compilar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Corregir version de libreria PDF
        run: |
          sed -i "s|com.github.barteksc:android-pdf-viewer:3.2.0-beta.1|com.github.barteksc:android-pdf-viewer:2.8.2|g" app/build.gradle
          grep "barteksc" app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generar iconos
        run: |
          pip install Pillow -q
          python3 gen_icons.py

      - name: Compilar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-v1.2
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
