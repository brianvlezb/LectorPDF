name: Crear proyecto y compilar APK

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraer proyecto
        run: |
          echo '' | base64 -d > setup.py
          python3 setup.py
          rm setup.py

      - name: Generar iconos
        run: |
          pip install Pillow -q
          python3 gen_icons.py

      - name: Descargar Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          rm -rf gradle-8.4 gradle-8.4-bin.zip

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap: Lector PDF v1.2"
          git push

      - name: Compilar APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LectorPDF-v1.2
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
